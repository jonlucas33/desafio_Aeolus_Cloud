video:
  source: "data/inputs/video.mp4"
  output: "data/outputs/result.mp4"
  resize_width: 1280

model:
  weights: "yolov8n.pt"          # auto-download via ultralytics; trocar por models/yolov8s.pt em produção com GPU
  confidence_threshold: 0.45
  iou_threshold: 0.5
  device: "cpu"                  # trocar para "cuda" quando GPU disponível
  fp16: false                    # fp16 requer CUDA; manter false em CPU

tracking:
  track_buffer: 30
  min_box_area: 100

counting:
  line_points: [[0, 540], [1280, 540]]
  direction: "top_to_bottom"
  min_displacement_px: 5
  class_vote_window: 15

ocr:
  enabled: true
  min_bbox_area_ratio: 0.01
  languages: ["pt", "en"]

database:
  backend: "sqlite"
  sqlite_path: "data/outputs/events.db"
  postgres_url: ""

rendering:
  line_color: [0, 255, 255]   # BGR: amarelo
  line_thickness: 2
