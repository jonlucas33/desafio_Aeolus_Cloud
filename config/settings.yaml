video:
  source: "data/inputs/video_cortado.mp4"
  output: "data/outputs/result.mp4"
  resize_width: 1280
  realtime: false             # false = backpressure (arquivo); true = descarte (câmera)

model:
  weights: "models/yolov8n.pt"          # auto-download via ultralytics;
  confidence_threshold: 0.45
  iou_threshold: 0.5
  device: "cpu"                  # trocar para "cuda" quando GPU disponível
  fp16: false                    # fp16 requer CUDA; manter false em CPU

tracking:
  track_buffer: 30
  min_box_area: 100

counting:
  line_points: [[0, 540], [1920, 540]]   # largura total do frame 1920px
  direction: "any"                        # ambas as mãos da pista
  min_displacement_px: 5
  class_vote_window: 15

ocr:
  enabled: true
  min_bbox_area_ratio: 0.01
  languages: ["pt", "en"]

database:
  backend: "sqlite"
  sqlite_path: "data/outputs/events.db"
  postgres_url: ""

rendering:
  line_color: [0, 255, 255]   # BGR: amarelo
  line_thickness: 2
