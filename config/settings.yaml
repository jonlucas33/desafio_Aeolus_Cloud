video:
  source: "data/inputs/video_cortado.mp4"
  output: "data/outputs/result.mp4"
  resize_width: 1280
  realtime: false             # false = backpressure (arquivo); true = descarte (câmera)

model:
  weights: "models/yolov8n.pt"          # auto-download via ultralytics;
  confidence_threshold: 0.45            # mantido para retrocompatibilidade
  base_conf_threshold: 0.35             # limiar passado ao YOLO (captura todas as motos)
  default_class_threshold: 0.45         # limiar rigoroso para carros/caminhões/ônibus
  motorcycle_threshold: 0.35            # limiar brando exclusivo para motos (class_id=3)
  iou_threshold: 0.5
  device: "cpu"                  # trocar para "cuda" quando GPU disponível
  fp16: false                    # fp16 requer CUDA; manter false em CPU

tracking:
  track_buffer: 30
  min_box_area: 100

counting:
  line_points: [[0, 540], [1920, 540]]   # largura total do frame 1920px
  direction: "any"                        # ambas as mãos da pista
  min_displacement_px: 5
  class_vote_window: 15
  suv_aspect_ratio_threshold: 0.85       # h/w > threshold → suv_pickup (carro COCO)
  truck_area_threshold: 0.02             # area_ratio < threshold → suv_pickup (caminhão COCO)

ocr:
  enabled: true
  min_bbox_area_ratio: 0.005
  confidence_threshold: 0.20
  languages: ["pt", "en"]

database:
  backend: "sqlite"
  sqlite_path: "data/outputs/events.db"
  postgres_url: ""

rendering:
  line_color: [0, 255, 255]   # BGR: amarelo
  line_thickness: 2
